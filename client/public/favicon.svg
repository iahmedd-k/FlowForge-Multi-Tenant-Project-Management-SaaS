<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#ffffff"/>
  
  <!-- Logo grid pattern (2x2) -->
  <g transform="translate(6, 6)">
    <!-- Top left - #635bff -->
    <circle cx="3" cy="3" r="2.5" fill="#635bff"/>
    
    <!-- Top right - #7b74ff -->
    <circle cx="9" cy="3" r="2.5" fill="#7b74ff"/>
    
    <!-- Bottom left - #4da6ff -->
    <circle cx="3" cy="9" r="2.5" fill="#4da6ff"/>
    
    <!-- Bottom right - #9c7bff -->
    <circle cx="9" cy="9" r="2.5" fill="#9c7bff"/>
  </g>
</svg>